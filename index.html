<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Riksan AI - CTO Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <aside class="sidebar">
        <button onclick="newChat()" class="new-chat-btn"><span>+</span> Chat Baru</button>
        <input type="text" id="search-history" placeholder="🔍 Cari percakapan..." class="search-input" oninput="filterHistory()">
        <div id="history-list" class="flex-1 overflow-y-auto mt-4"></div>
        <div class="text-[10px] text-gray-600 text-center mt-4 uppercase tracking-tighter">SawargiPay v2.0</div>
    </aside>

    <main>
        <header class="p-5 flex justify-between items-center bg-[#131314]">
            <span class="text-xl tracking-tight">Riksan AI <span class="text-blue-500 text-xs">Business</span></span>
            <div class="text-[10px] text-green-500 font-bold border border-green-900 px-2 py-0.5 rounded">BLOOMBERG LIVE</div>
        </header>

        <div id="chat-box" class="chat-display"></div>

        <div class="input-container">
            <div class="input-wrapper">
                <input type="text" id="user-input" placeholder="Tanyakan tentang pasar global atau coding..." onkeypress="if(event.key==='Enter') sendMessage()">
                <button onclick="sendMessage()" class="send-btn">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M5 10l7-7m0 0l7 7m-7-7v18" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                </button>
            </div>
        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
