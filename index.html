<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Riksan AI - Gemini Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <aside class="sidebar">
        <button onclick="newChat()" class="new-chat-btn">
            <span style="font-size: 20px;">+</span> Chat Baru
        </button>
        <div style="padding-left: 15px; font-size: 12px; color: #80868b; margin-bottom: 10px;">Riwayat</div>
        <div id="history-list" style="flex: 1; overflow-y: auto;"></div>
    </aside>

    <main>
        <div id="chat-box" class="chat-container">
            </div>

        <div class="input-area">
            <div class="input-box">
                <input type="text" id="user-input" placeholder="Tuliskan perintah..." onkeypress="if(event.key==='Enter') sendMessage()">
                <button onclick="sendMessage()" class="send-btn">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
                </button>
            </div>
            <p style="font-size: 11px; text-align: center; color: #5f6368; margin-top: 10px;">Riksan AI powered by Groq Llama 3.3</p>
        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
