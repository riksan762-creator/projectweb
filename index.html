<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LETAL 777</title>

<style>
*{
  margin:0;padding:0;box-sizing:border-box;
  font-family:Arial,Helvetica,sans-serif
}
body{
  background:#000;color:#fff;
  display:flex;justify-content:center
}
.app{
  width:100%;max-width:430px;
  background:radial-gradient(circle at top,#0f4d2c,#000);
}

/* ===== TOP BAR ===== */
.topbar{
  background:#f2f2f2;color:#000;
  display:flex;justify-content:space-between;align-items:center;
  padding:8px 10px;font-size:14px
}
.top-left{
  display:flex;align-items:center;gap:8px
}
.icon{
  width:30px;height:30px;border-radius:50%;
  background:radial-gradient(circle,#00ff99,#009966);
  display:flex;align-items:center;justify-content:center;
  font-weight:900;color:#000;
  box-shadow:0 0 10px rgba(0,255,153,.8)
}
.download{
  background:#26a69a;color:#fff;border:none;
  padding:6px 14px;border-radius:8px;
  font-weight:bold
}

/* ===== HEADER ===== */
.header{
  position:relative;padding:14px 12px
}
.logo{
  font-size:30px;font-weight:900;
  color:#ffd700;
  text-shadow:0 0 12px #00ff99
}
.livechat{
  position:absolute;right:12px;top:12px;
  background:linear-gradient(#ffb300,#e65100);
  padding:6px 16px;border-radius:20px;
  font-size:13px;font-weight:bold;
  box-shadow:0 0 10px rgba(255,152,0,.7)
}

/* ===== SLIDER (NO BLINK) ===== */
.slider{
  margin:10px;
  border-radius:16px;
  overflow:hidden;
  position:relative;
  height:210px;
  background:#000
}
.slide{
  position:absolute;
  inset:0;
  opacity:0;
  transition:opacity .8s ease-in-out;
}
.slide.active{
  opacity:1;
  z-index:1
}
.slide img{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block
}

/* ===== CTA ===== */
.cta{
  margin:10px;
  background:linear-gradient(#1aff6a,#0c8a3d);
  padding:14px;
  border-radius:14px;
  text-align:center;
  font-weight:900;
  color:#000;
  box-shadow:0 0 15px rgba(0,255,153,.6)
}

/* ===== LOGIN ===== */
.login{padding:14px}
.login p{text-align:center;margin-bottom:10px}
.input{
  width:100%;padding:14px;margin-bottom:10px;
  border-radius:10px;border:none;font-size:14px
}
.row{
  display:flex;justify-content:space-between;
  font-size:13px;margin-bottom:12px
}
.row a{color:#00ff99;text-decoration:none}
.btn-login{
  width:100%;padding:14px;
  background:linear-gradient(#ff3b3b,#b30000);
  border:none;border-radius:12px;
  color:#fff;font-size:16px;font-weight:900;
  box-shadow:0 0 15px rgba(255,0,0,.6)
}
.btn-daftar{
  margin-top:8px;width:100%;padding:14px;
  background:linear-gradient(#2196f3,#0d47a1);
  border:none;border-radius:12px;
  color:#fff;font-size:16px;font-weight:900
}

/* ===== SERVICE ===== */
.service{
  margin:12px;padding:12px;
  background:rgba(0,0,0,.4);
  border-radius:16px
}
.service h3{
  text-align:center;margin-bottom:10px;
  color:#00ff99
}
.box{display:flex;gap:8px}
.card{
  flex:1;
  background:linear-gradient(#1aff6a,#0c8a3d);
  color:#000;
  border-radius:14px;
  padding:12px;
  text-align:center;
  font-weight:bold
}
.card span{
  display:block;
  font-size:22px;
  margin:4px 0
}

/* ===== FLOAT CHAT ===== */
.chat-float{
  position:fixed;bottom:16px;left:16px;
  width:56px;height:56px;border-radius:50%;
  background:radial-gradient(circle,#00ff99,#009966);
  color:#000;
  display:flex;align-items:center;justify-content:center;
  font-size:26px;
  box-shadow:0 0 20px rgba(0,255,153,.9);
  cursor:pointer
}

/* ===== FOOTER ===== */
.footer{
  text-align:center;font-size:12px;
  opacity:.7;padding:12px
}

/* ===== TOAST ===== */
.toast{
  position:fixed;top:20px;left:50%;
  transform:translateX(-50%);
  background:#000;padding:10px 16px;
  border-radius:10px;
  box-shadow:0 0 15px #00ff99;
  display:none
}
</style>
</head>

<body>

<div class="app">

<!-- TOP -->
<div class="topbar">
  <div class="top-left">
    <div class="icon">8</div>
    <div>LETAL 777</div>
  </div>
  <button class="download">Download</button>
</div>

<!-- HEADER -->
<div class="header">
  <div class="logo">LETAL 777</div>
  <div class="livechat">Live Chat</div>
</div>

<!-- SLIDER -->
<div class="slider">
  <div class="slide active"><img src="baner1.jpg"></div>
  <div class="slide"><img src="baner2.jpg"></div>
  <div class="slide"><img src="baner3.jpg"></div>
</div>

<div class="cta">KLIK DISINI UNTUK INFORMASI SITUS</div>

<!-- LOGIN -->
<div class="login">
  <p>Silahkan login untuk mulai bermain</p>
  <input id="user" class="input" placeholder="Username">
  <input id="pass" type="password" class="input" placeholder="Password">
  <div class="row">
    <a href="#">Versi WAP</a>
    <a href="#">Lupa password?</a>
  </div>
  <button class="btn-login" onclick="login()">LOG IN</button>
  <button class="btn-daftar">DAFTAR</button>
</div>

<!-- SERVICE -->
<div class="service">
  <h3>Servis Kami</h3>
  <div class="box">
    <div class="card">Deposit<span>1</span>Menit</div>
    <div class="card">Withdraw<span>3</span>Menit</div>
    <div class="card">Member<span id="m">271335</span></div>
  </div>
</div>

<div class="footer">©️ 2026 HADI TOTO</div>

</div>

<div class="chat-float" onclick="alert('Live Chat Aktif (Demo)')">💬</div>
<div id="toast" class="toast"></div>

<script>
// SLIDER FADE (NO BLINK)
let slides=document.querySelectorAll(".slide");
let i=0;
setInterval(()=>{
  slides[i].classList.remove("active");
  i=(i+1)%slides.length;
  slides[i].classList.add("active");
},4000);

// MEMBER COUNTER
let m=document.getElementById("m");
let n=270000,t=271335;
let c=setInterval(()=>{
 n+=111;m.innerText=n;
 if(n>=t){m.innerText=t;clearInterval(c);}
},20);

// LOGIN DEMO
function login(){
  let u=user.value,p=pass.value;
  showToast(u==="admin"&&p==="12345"
    ?"Login berhasil!"
    :"Username atau password salah");
}

// TOAST
function showToast(msg){
  let t=document.getElementById("toast");
  t.innerText=msg;
  t.style.display="block";
  setTimeout(()=>t.style.display="none",2000);
}
</script>

</body>
</html>
