<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Riksan AI - Pro</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    
    <link rel="stylesheet" href="style.css">
    
    <style>
        /* Tambahan CSS langsung biar input stabil */
        #userInput {
            font-size: 16px !important; /* Mencegah auto-zoom di iOS */
            line-height: 1.5;
        }
        /* Mencegah pergerakan layout yang kasar */
        html, body {
            position: fixed;
            overflow: hidden;
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body class="bg-[#0d0d0d] text-[#ececec] antialiased">

    <div class="flex h-screen overflow-hidden flex-col">
        <main class="flex-1 flex flex-col relative overflow-hidden">
            
            <header class="p-4 flex justify-between items-center bg-[#0d0d0d]/80 backdrop-blur-md sticky top-0 z-20 border-b border-white/5">
                <div class="flex items-center gap-2">
                    <span class="font-bold tracking-tight text-white">Riksan AI</span>
                    <span class="text-[10px] bg-[#2f2f2f] px-2 py-0.5 rounded-full text-slate-400 uppercase tracking-widest">Core v3.3</span>
                </div>
                <button onclick="location.reload()" class="text-slate-400 hover:text-white transition"><i class="fas fa-plus"></i></button>
            </header>

            <div id="chatArea" class="flex-1 overflow-y-auto px-4 md:px-0 max-w-3xl mx-auto w-full space-y-8 py-10 custom-scroll">
                <div class="text-center py-20 opacity-40">
                    <div class="w-16 h-16 bg-[#2f2f2f] rounded-3xl mx-auto mb-4 flex items-center justify-center">
                        <i class="fas fa-bolt text-2xl"></i>
                    </div>
                    <h2 class="text-xl font-medium">Ada yang perlu dibantu, Bos?</h2>
                    <p class="text-sm mt-2">Analisis kode, gambar, atau logika matematika.</p>
                </div>
            </div>

            <div id="imagePreview" class="hidden max-w-3xl mx-auto w-full px-4 mb-2">
                <div class="relative inline-block group">
                    <img id="previewImg" class="w-24 h-24 object-cover rounded-2xl border-2 border-[#5436da] shadow-2xl">
                    <button id="removeImg" class="absolute -top-2 -right-2 bg-red-500 text-white rounded-full w-6 h-6 flex items-center justify-center text-xs shadow-lg hover:bg-red-600 transition">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
            </div>

            <footer class="p-4 bg-gradient-to-t from-[#0d0d0d] via-[#0d0d0d] to-transparent">
                <div class="max-w-3xl mx-auto relative">
                    <form id="chatForm" class="bg-[#2f2f2f] rounded-[28px] p-2 flex items-end gap-1 shadow-2xl border border-white/5 focus-within:border-white/20 transition-all">
                        
                        <div class="flex pb-1">
                            <button type="button" id="cameraBtn" class="w-10 h-10 rounded-full hover:bg-white/5 text-slate-400 flex items-center justify-center transition">
                                <i class="fas fa-paperclip text-lg"></i>
                            </button>
                            <input type="file" id="fileInput" accept="image/*" class="hidden">
                        </div>

                        <textarea 
                            id="userInput" 
                            rows="1" 
                            placeholder="Tanya Riksan AI..." 
                            class="flex-1 bg-transparent border-none outline-none py-3 px-2 text-[16px] resize-none max-h-40 overflow-y-auto placeholder:text-slate-500 text-white"
                        ></textarea>

                        <div class="flex pb-1 pr-1 gap-1">
                            <button type="button" id="micBtn" class="w-10 h-10 rounded-full hover:bg-white/5 text-slate-400 flex items-center justify-center transition">
                                <i class="fas fa-microphone"></i>
                            </button>
                            <button type="submit" id="sendBtn" class="w-10 h-10 bg-white text-black rounded-full flex items-center justify-center hover:scale-105 active:scale-95 transition-all">
                                <i class="fas fa-arrow-up"></i>
                            </button>
                        </div>
                    </form>
                    <p class="text-[9px] text-center text-slate-600 mt-3 uppercase tracking-tighter italic">Optimized for CTO SawargiPay - Private Secure Session</p>
                </div>
            </footer>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
