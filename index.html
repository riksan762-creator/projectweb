<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Riksan AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="light-dark">

    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <button onclick="newChat()" class="new-chat-btn">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                <span>Chat Baru</span>
            </button>
        </div>
        <div class="history-section">
            <p class="history-label">Riwayat Percakapan</p>
            <div id="history-list"></div>
        </div>
    </aside>

    <main class="main-content">
        <header class="top-nav">
            <button id="menu-btn" class="icon-btn">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
            </button>
            <div class="model-info">Riksan AI <span>v2.0</span></div>
            <div class="user-profile">R</div>
        </header>

        <div id="chat-box" class="chat-container">
            </div>

        <div class="input-wrapper">
            <div class="input-container">
                <input type="text" id="user-input" placeholder="Tanyakan apa saja..." onkeypress="if(event.key==='Enter') sendMessage()">
                <button onclick="sendMessage()" class="send-btn">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
                </button>
            </div>
            <p class="disclaimer">Riksan AI dapat membuat kesalahan. Pertimbangkan untuk memeriksa informasi penting.</p>
        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
