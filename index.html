<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Riksan AI v3.3</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <button onclick="newChat()" class="new-chat-btn">+ Chat Baru</button>
        </div>
        <div class="history-list" id="history-list"></div>
    </div>
    
    <div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

    <div class="main-content">
        <header class="top-nav">
            <button class="icon-btn" onclick="toggleSidebar()">☰</button>
            <div class="model-name">Riksan AI <span>3.3</span></div>
            <button class="icon-btn" onclick="newChat()">📝</button>
        </header>

        <main class="chat-container" id="chat-container">
            <div class="welcome-screen" id="welcome-screen">
                <div class="ai-logo">✨</div>
                <h1>Ada yang bisa saya bantu?</h1>
            </div>
        </main>

        <footer class="input-area">
            <div class="input-wrapper">
                <input type="text" id="user-input" placeholder="Tanya Riksan AI..." autocomplete="off">
                <button id="send-btn" onclick="sendMessage()">↑</button>
            </div>
            <p class="footer-note">Riksan AI dapat membuat kesalahan. Periksa informasi penting.</p>
        </footer>
    </div>

    <script src="app.js"></script>
</body>
</html>
