<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Riksan AI v3.3</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-top">
            <button class="new-chat-btn" onclick="newChat()">+ Chat Baru</button>
        </div>
        <div class="history-container" id="history-list">
            </div>
    </aside>

    <div class="overlay" id="sidebar-overlay" onclick="toggleSidebar()"></div>

    <div class="main-content">
        <header class="navbar">
            <button class="menu-btn" onclick="toggleSidebar()">☰</button>
            <div class="model-info">Riksan AI <span>3.3</span></div>
            <button class="menu-btn" onclick="newChat()">📝</button>
        </header>

        <main class="chat-area" id="chat-container">
            <div class="welcome-hero" id="welcome-screen">
                <div class="logo-ai">✨</div>
                <h1>Apa yang bisa saya bantu hari ini?</h1>
            </div>
        </main>

        <footer class="input-section">
            <div class="input-wrapper">
                <input type="text" id="user-input" placeholder="Tanya sesuatu..." autocomplete="off">
                <button class="send-btn" id="send-btn" onclick="sendMessage()">↑</button>
            </div>
            <p class="disclaimer">Riksan AI Core v3.3 dikembangkan oleh Riksan.</p>
        </footer>
    </div>

    <script src="app.js"></script>
</body>
</html>
