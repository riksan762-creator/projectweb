<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Riksan AI - Pro Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="text-slate-200">

    <div class="flex h-screen p-0 md:p-6 gap-6">
        <aside class="hidden lg:flex flex-col w-72 glass-panel rounded-[2.5rem] p-8">
            <div class="mb-10">
                <h1 class="text-xl font-extrabold tracking-tighter text-white uppercase">Riksan <span class="text-blue-500">Project</span></h1>
                <p class="text-[10px] text-slate-500 font-bold uppercase tracking-[0.3em]">Neural Interface v2.0</p>
            </div>
            
            <nav class="flex-1 space-y-2">
                <div class="p-4 rounded-2xl bg-white/5 border border-white/5 hover:bg-white/10 transition cursor-pointer">
                    <div class="flex items-center gap-3">
                        <i class="fas fa-comment-dots text-blue-500"></i>
                        <span class="text-sm font-semibold">AI Assistant</span>
                    </div>
                </div>
            </nav>

            <div class="mt-auto pt-6 border-t border-white/5">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-full bg-gradient-to-tr from-blue-600 to-purple-600 flex items-center justify-center text-sm font-bold">R</div>
                    <div>
                        <p class="text-xs font-bold text-white uppercase tracking-wider">Riksan</p>
                        <p class="text-[10px] text-slate-500 uppercase">Co-Founder & CTO</p>
                    </div>
                </div>
            </div>
        </aside>

        <main class="flex-1 flex flex-col glass-panel md:rounded-[2.5rem] overflow-hidden relative border-white/10">
            <header class="px-6 py-5 border-b border-white/5 flex justify-between items-center bg-white/5">
                <div class="flex items-center gap-3">
                    <div class="w-2.5 h-2.5 bg-green-500 rounded-full animate-pulse shadow-[0_0_10px_rgba(34,197,94,0.6)]"></div>
                    <span class="text-[11px] font-bold uppercase tracking-widest text-slate-400">System Online</span>
                </div>
                <div class="flex items-center gap-4">
                    <button id="speakerToggle" class="text-slate-400 hover:text-white transition"><i class="fas fa-volume-up"></i></button>
                    <i class="fas fa-shield-check text-blue-500 text-sm"></i>
                </div>
            </header>

            <div id="chatArea" class="flex-1 overflow-y-auto p-6 md:p-10 space-y-8 chat-container">
                <div class="max-w-2xl mx-auto text-center py-20 opacity-30">
                    <i class="fas fa-bolt text-4xl mb-6 text-blue-500"></i>
                    <h2 class="text-2xl font-bold text-white mb-2">Sistem Siap, Bos Riksan.</h2>
                </div>
            </div>

            <footer class="p-6 md:p-10">
                <div class="max-w-4xl mx-auto">
                    <form id="chatForm" class="flex items-center gap-2 p-2 bg-white/5 border border-white/10 rounded-2xl focus-within:border-blue-500/50 transition-all">
                        <button type="button" id="cameraBtn" class="w-12 h-12 flex items-center justify-center text-slate-400 hover:text-white transition rounded-xl">
                            <i class="fas fa-camera"></i>
                        </button>
                        <input type="file" id="fileInput" class="hidden" accept="image/*">
                        
                        <input type="text" id="userInput" placeholder="Tulis instruksi..." class="flex-1 bg-transparent border-none outline-none px-2 text-white text-sm md:text-base" autocomplete="off">

                        <button type="button" id="micBtn" class="w-12 h-12 flex items-center justify-center text-slate-400 hover:text-white transition rounded-xl">
                            <i class="fas fa-microphone"></i>
                        </button>

                        <button type="submit" class="w-12 h-12 bg-blue-600 hover:bg-blue-500 text-white rounded-xl shadow-xl active:scale-95 transition-all">
                            <i class="fas fa-paper-plane"></i>
                        </button>
                    </form>
                </div>
            </footer>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
